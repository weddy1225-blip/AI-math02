<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字雙胞胎找一找 - 完整回顧版</title>
    <style>
        :root {
            --bg-color: #f0f7fa;
            --card-color: #ffffff;
            --primary-blue: #3498db;
            --success-green: #2ecc71;
            --error-red: #e74c3c;
            --text-main: #2c3e50;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 650px;
            background: var(--card-color);
            padding: 30px; border-radius: 25px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.1);
            text-align: center;
        }
        .header { display: flex; justify-content: space-between; font-weight: bold; color: #7f8c8d; }
        .progress-container {
            width: 100%; height: 10px; background: #eee;
            border-radius: 10px; margin: 15px 0 30px 0; overflow: hidden;
        }
        #progress-bar { width: 0%; height: 100%; background: var(--primary-blue); transition: 0.4s; }
        .equation-wrapper { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 30px 0; }
        .eq-box { flex: 1; padding: 25px 10px; background: #f9fbfc; border: 3px solid #e1e8ed; border-radius: 20px; font-size: 24px; font-weight: 800; }
        .btn-group { display: flex; gap: 15px; }
        .btn { flex: 1; padding: 15px; font-size: 20px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; color: white; }
        .btn-same { background: var(--success-green); box-shadow: 0 5px 0 #27ae60; }
        .btn-diff { background: var(--error-red); box-shadow: 0 5px 0 #c0392b; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { background: #ccc; box-shadow: none; }
        
        /* 回顧表格樣式 */
        .history-area { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .history-table th { background: #f8f9fa; padding: 10px; border-bottom: 2px solid #eee; }
        .history-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .status-win { color: var(--success-green); font-weight: bold; }
        .status-lose { color: var(--error-red); font-weight: bold; }
        .result-screen { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="play-screen">
        <div class="header">
            <span>題次：<span id="q-num">1</span> / 10</span>
            <span>得分：<span id="score">0</span></span>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
        <h2>🕵️ 數字雙胞胎找一找</h2>
        <div class="equation-wrapper">
            <div class="eq-box" id="eq-left">?</div>
            <div style="font-weight:bold; color:#bdc3c7;">VS</div>
            <div class="eq-box" id="eq-right">?</div>
        </div>
        <div class="btn-group">
            <button class="btn btn-same" id="btn-s" onclick="handleInput(true)">一樣</button>
            <button class="btn btn-diff" id="btn-d" onclick="handleInput(false)">不一樣</button>
        </div>
        <div id="feedback" style="margin-top:20px; font-weight:bold;"></div>
    </div>

    <div id="result-screen" class="result-screen">
        <h2>🔍 偵探結案報告</h2>
        <div style="font-size: 40px; color: var(--primary-blue); margin: 10px 0;">得分：<span id="final-score">0</span></div>
        <button class="btn btn-same" style="background:var(--primary-blue); box-shadow:0 5px 0 #2980b9; flex:none; width:200px;" onclick="initGame()">再挑戰一次</button>
        
        <div class="history-area">
            <h3>📋 案件回顧：</h3>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>題號</th>
                        <th>算式對照</th>
                        <th>結果</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let score, currentStep, isCorrectSame, history = [];
    const totalSteps = 10;

    function initGame() {
        score = 0; currentStep = 1; history = [];
        document.getElementById('score').innerText = score;
        document.getElementById('play-screen').style.display = 'block';
        document.getElementById('result-screen').style.display = 'none';
        nextQuestion();
    }

    function nextQuestion() {
        if (currentStep > totalSteps) { endGame(); return; }
        document.getElementById('q-num').innerText = currentStep;
        document.getElementById('progress-bar').style.width = ((currentStep - 1) / totalSteps * 100) + "%";
        document.getElementById('feedback').innerText = "";
        toggleBtns(true);

        isCorrectSame = Math.random() > 0.5;
        let v1 = Math.floor(Math.random() * 15) + 2;
        let v2 = isCorrectSame ? v1 : v1 + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
        if (v2 < 1) v2 = v1 + 2;

        const type = Math.floor(Math.random() * 4);
        let L, R, a = Math.floor(Math.random() * 30) + 5, b = Math.floor(Math.random() * 30) + 5;

        if (type === 0) { L = `${a} + ？ = ${a+v1}`; R = `${b} + ？ = ${b+v2}`; }
        else if (type === 1) { L = `${a+20} - ？ = ${a+20-v1}`; R = `${b+20} - ？ = ${b+20-v2}`; }
        else if (type === 2) { L = `${a} + ？ = ${a+v1}`; R = `${b+40} - ？ = ${b+40-v2}`; }
        else { let m = Math.floor(Math.random()*5)+2; L = `${m} × ？ = ${m*v1}`; R = `${b} + ？ = ${b+v2}`; }

        document.getElementById('eq-left').innerText = L;
        document.getElementById('eq-right').innerText = R;
        
        // 紀錄題目資訊
        history.push({ q: `${L} 🆚 ${R}`, ans: isCorrectSame });
    }

    function handleInput(choice) {
        toggleBtns(false);
        const win = (choice === isCorrectSame);
        history[currentStep-1].user = choice;
        history[currentStep-1].win = win;

        if (win) { score += 10; document.getElementById('feedback').innerText = "✅ 正確！"; document.getElementById('feedback').style.color = "var(--success-green)"; }
        else { document.getElementById('feedback').innerText = "❌ 不對喔！"; document.getElementById('feedback').style.color = "var(--error-red)"; }
        
        document.getElementById('score').innerText = score;
        currentStep++;
        setTimeout(nextQuestion, 800);
    }

    function toggleBtns(s) { document.getElementById('btn-s').disabled = !s; document.getElementById('btn-d').disabled = !s; }

    function endGame() {
        document.getElementById('play-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        
        const body = document.getElementById('history-body');
        body.innerHTML = "";
        history.forEach((item, index) => {
            const row = `<tr>
                <td>${index + 1}</td>
                <td style="text-align:left;">${item.q}</td>
                <td class="${item.win ? 'status-win' : 'status-lose'}">${item.win ? '答對' : '答錯'}<br><small>(正解:${item.ans ? '一樣' : '不同'})</small></td>
            </tr>`;
            body.innerHTML += row;
        });
    }

    initGame();
</script>
</body>
</html>
